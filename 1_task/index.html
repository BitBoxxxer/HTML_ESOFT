<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домик из CSS</title>
    <style>
        body {
            background: linear-gradient(135deg, #87CEEB 0%, #B0E0E6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /*это чтобы дом был по середине экрана :))*/
        }

        .house {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 50px auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        .base {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-color: #f4bc6e;
            border-radius: 8px 8px 0 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .roof {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 200px solid transparent;
            border-right: 200px solid transparent;
            border-bottom: 160px solid #b54c3c;
            transform: translateY(0);
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
        }

        .chimney {
            position: absolute;
            top: 30px;
            right: 50px;
            width: 40px;
            height: 120px;
            background-color: #9c6b3e;
            border-radius: 8px 8px 4px 4px;
            z-index: 2;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.1);
        }

        .window {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: #f9e2a1;
            border-radius: 50%;
            border: 5px solid #d9b48b;
            box-shadow: inset 0 0 0 3px #f0cf9f, 0 5px 10px rgba(0,0,0,0.2);
            z-index: 3;
        }

        .window::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: #b97f48;
            transform: translateY(-50%);
        }

        .window::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: #b97f48;
            transform: translateX(-50%);
        }

        .door {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 110px;
            background-color: #c39a6b;
            border-radius: 12px 12px 0 0;
            border: 2px solid #8b5a2b;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.2);
            z-index: 2;
        }

        /*да, это облако, потому что оно круто выглядит :D */
        .cloud {
            position: absolute;
            top: -50px;
            right: -30px;
            width: 100px;
            height: 60px;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            filter: blur(8px);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="house">
        <div class="base"></div>
        <div class="roof"></div>
        <div class="chimney"></div>
        <div class="window"></div>
        <div class="door"></div>
        <div class="grass"></div>
        <div class="cloud"></div>
    </div>
</body>
</html>
